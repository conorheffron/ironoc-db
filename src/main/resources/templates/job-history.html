<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta http-equiv="x-ua-compatible" content="ie=edge">
    <title>iRonoc DB | Job History</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css" crossorigin="anonymous">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.4.1/css/all.css" crossorigin="anonymous">
    <link rel="stylesheet" href="/style/main.css">
</head>
<body>
<header th:replace="~{navbar.html}"></header>
<main class="container py-5">
    <div class="card shadow-sm mb-4">
        <div class="card-body">
            <h3 class="mb-2">Job History for <span th:text="${person.firstName + ' ' + person.surname}"></span></h3>
            <a th:href="@{/}" class="btn btn-secondary btn-sm mb-3">
                <i class="fa fa-arrow-left"></i> Back to Employees
            </a>
            <div class="table-responsive">
                <table class="table table-hover table-bordered w-100">
                    <thead class="thead-light">
                    <tr>
                        <th>#</th>
                        <th>Job Title</th>
                        <th>Employer Name</th>
                        <th>Start Year</th>
                        <th>Edit</th>
                        <th>Delete</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="emp : ${employers}">
                        <td th:text="${emp.employerId}"></td>
                        <td th:text="${emp.title}"></td>
                        <td th:text="${emp.employerName}"></td>
                        <td th:text="${emp.startYear}"></td>
                        <td>
                            <a th:href="@{/job-history/edit/{id}(id=${emp.employerId})}" class="btn btn-primary btn-sm rounded-0" title="Edit">
                                <i class="fa fa-edit"></i>
                            </a>
                        </td>
                        <td>
                            <form action="#" th:action="@{/job-history/delete/{id}(id=${emp.employerId})}" th:method="delete" class="d-inline">
                                <input type="hidden" name="_method" value="delete" />
                                <input type="hidden" name="personId" th:value="${person.id}" />
                                <button type="submit" class="btn btn-danger btn-sm rounded-0" title="Delete">
                                    <i class="fa fa-trash"></i>
                                </button>
                            </form>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <div class="card shadow-sm">
        <div class="card-body">
            <h3 class="mb-4">Update Job History</h3>
            <form action="#" th:action="@{/job-history/add/{personId}(personId=${person.id})}" th:object="${employer}" method="post">
                <div class="form-row">
                    <div class="form-group col-md-4">
                        <label for="title">Job Title</label>
                        <input type="text" th:field="*{title}" class="form-control" id="title" placeholder="Enter Job Title...">
                        <span th:if="${#fields.hasErrors('title')}" th:errors="*{title}" class="text-danger small"></span>
                    </div>
                    <div class="form-group col-md-4">
                        <label for="employerName">Employer Name</label>
                        <input type="text" th:field="*{employerName}" class="form-control" id="employerName" placeholder="Enter Employer Name...">
                        <span th:if="${#fields.hasErrors('employerName')}" th:errors="*{employerName}" class="text-danger small"></span>
                    </div>
                    <div class="form-group col-md-4">
                        <label for="startYear">Start Year</label>
                        <input type="number" th:field="*{startYear}" class="form-control" id="startYear" placeholder="Enter Start Year...">
                        <span th:if="${#fields.hasErrors('startYear')}" th:errors="*{startYear}" class="text-danger small"></span>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary">Update Job History</button>
            </form>
        </div>
    </div>
</main>
</body>
</html>
