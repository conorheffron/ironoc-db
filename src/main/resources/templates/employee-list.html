<div th:switch="${personsList}" class="card shadow-sm mb-4">
    <div class="card-body">
        <h5 class="card-title mb-3">Employees</h5>
        <div th:case="*">
            <div class="table-responsive">
                <table class="table table-hover table-bordered w-100">
                    <thead class="thead-light">
                    <tr>
                        <th>#</th>
                        <th>Title</th>
                        <th>First Name</th>
                        <th>Surname</th>
                        <th>Age</th>
                        <th>Edit</th>
                        <th>Delete</th>
                        <th>Update Job History</th>
                        <th>Job History</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="person : ${personsList}">
                        <td th:text="${person.id}"></td>
                        <td th:text="${person.title}"></td>
                        <td th:text="${person.firstName}"></td>
                        <td th:text="${person.surname}"></td>
                        <td th:text="${person.age}"></td>
                        <td>
                            <a th:href="@{/edit/{id}(id=${person.id})}" class="btn btn-primary btn-sm rounded-0" title="Edit">
                                <i class="fa fa-edit"></i>
                            </a>
                        </td>
                        <td>
                            <form action="#" th:action="@{/delete/{id}(id=${person.id})}" th:method="delete" class="d-inline">
                                <input type="hidden" name="_method" value="delete" />
                                <button type="submit" class="btn btn-danger btn-sm rounded-0" title="Delete">
                                    <i class="fa fa-trash"></i>
                                </button>
                            </form>
                        </td>
                        <td>
                            <a th:href="@{/job-history/{personId}(personId=${person.id})}" class="btn btn-success btn-sm rounded-0" title="Manage Job History">
                                <i class="fa fa-plus"></i>
                            </a>
                        </td>
                        <td>
                            <table class="table table-sm mb-0">
                                <thead th:if="${not #lists.isEmpty(person.employers)}">
                                <tr>
                                    <th>Job Title</th>
                                    <th>Employer Name</th>
                                    <th>Start Year</th>
                                </tr>
                                </thead>
                                <tbody>
                                <tr th:each="employer : ${person.employers}">
                                    <td th:text="${employer.title}"></td>
                                    <td th:text="${employer.employerName}"></td>
                                    <td th:text="${employer.startYear}"></td>
                                </tr>
                                </tbody>
                            </table>
                        </td>
                    </tr>
                    <tr th:if="${not #lists.isEmpty(personsList)}">
                        <td colspan="4"></td>
                        <td colspan="5">
                            <b th:text="${#aggregates.avg(personsList.![age])}"></b> is the Average Employee Age
                        </td>
                    </tr>
                    <tr th:if="${not #lists.isEmpty(personsList)}">
                        <td colspan="6"></td>
                        <td colspan="3">
                            <b th:text="${#aggregates.sum(personsList.![age])}"></b> is the Sum of Ages
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
            <nav th:if="${totalPages != null and totalPages > 1}" aria-label="Employee list pagination" class="mt-3">
                <ul class="pagination justify-content-center">
                    <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled' : ''">
                        <a class="page-link" th:href="@{/(page=${currentPage - 1})}" aria-label="Previous">
                            <span aria-hidden="true">&laquo;</span>
                        </a>
                    </li>
                    <li class="page-item"
                        th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                        th:classappend="${i == currentPage} ? 'active' : ''">
                        <a class="page-link" th:href="@{/(page=${i})}" th:text="${i + 1}">1</a>
                    </li>
                    <li class="page-item" th:classappend="${currentPage + 1 >= totalPages} ? 'disabled' : ''">
                        <a class="page-link" th:href="@{/(page=${currentPage + 1})}" aria-label="Next">
                            <span aria-hidden="true">&raquo;</span>
                        </a>
                    </li>
                </ul>
            </nav>
        </div>
    </div>
</div>
